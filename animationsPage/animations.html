<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jafer Nusier</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .page {
            display: flex;
            flex-direction: column;
            width: min(100vw, calc(100vh * 16 / 9));
            height: min(100vh, calc(100vw * 9 / 16));
        }
        .container {
            display: flex;
            height: calc(100% * 480 / 720);
        }
        .container canvas {
            width: 50%;
            height: 100%;
            background: white;
        }
        #stripCanvas {
            display: block;
            width: 100%;
            height: calc(100% * 240 / 720);
            background: black;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="container">
            <canvas style="border-right: 2px solid black;" id="canvas1"></canvas>
            <canvas id="canvas2"></canvas>
        </div>
        <canvas id="stripCanvas"></canvas>
    </div>

    <script src="../utils/functions.js"></script>
    <script src="../utils/sprite.js"></script>
    <script src="../utils/portal.js"></script>
    <script>
        // Bottom strip reserved for the platformer hero and the home portal
        const STRIP_HEIGHT = 240;

        // First Canvas Animation
        var canvas1 = document.getElementById('canvas1');
        canvas1.width = GAME_WIDTH / 2;
        canvas1.height = GAME_HEIGHT - STRIP_HEIGHT;
        var c1 = canvas1.getContext('2d');

        var mouse1 = {
            x: undefined,
            y: undefined
        }

        var maxRadius = 40;

        window.addEventListener('mousemove', (e) => {
            const rect = canvas1.getBoundingClientRect();
            mouse1.x = (e.clientX - rect.left) * (canvas1.width / rect.width);
            mouse1.y = (e.clientY - rect.top) * (canvas1.height / rect.height);
        });
        
        function getDistance(x1, y1, x2, y2) {
            let xDistance = x2 - x1;
            let yDistance = y2 - y1; 
        
            return Math.sqrt(Math.pow(xDistance, 2) + Math.pow(yDistance, 2));
        }
        
        function rotate(velocity, angle) {
            const rotatedVelocities = {
                x: velocity.x * Math.cos(angle) - velocity.y * Math.sin(angle),
                y: velocity.x * Math.sin(angle) + velocity.y * Math.cos(angle)
            };
            return rotatedVelocities;
        }
        
        function resolveCollision(particle, otherParticle) {
            const xVelocityDiff = particle.velocity.x - otherParticle.velocity.x;
            const yVelocityDiff = particle.velocity.y - otherParticle.velocity.y;
        
            const xDist = otherParticle.x - particle.x;
            const yDist = otherParticle.y - particle.y;
        
            if (xVelocityDiff * xDist + yVelocityDiff * yDist >= 0) {
                const angle = -Math.atan2(otherParticle.y - particle.y, otherParticle.x - particle.x);
                const m1 = particle.mass;
                const m2 = otherParticle.mass;
                const u1 = rotate(particle.velocity, angle);
                const u2 = rotate(otherParticle.velocity, angle);
                const v1 = { x: u1.x * (m1 - m2) / (m1 + m2) + u2.x * 2 * m2 / (m1 + m2), y: u1.y };
                const v2 = { x: u2.x * (m1 - m2) / (m1 + m2) + u1.x * 2 * m2 / (m1 + m2), y: u2.y };
                const vFinal1 = rotate(v1, -angle);
                const vFinal2 = rotate(v2, -angle);
                particle.velocity.x = vFinal1.x;
                particle.velocity.y = vFinal1.y;
                otherParticle.velocity.x = vFinal2.x;
                otherParticle.velocity.y = vFinal2.y;
            }
        }
        
        class Circle {
            constructor(x, y, radius, colour) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.minRadius = radius;
                this.colour = colour;
                this.velocity = {
                    x: (Math.random() - 0.5) * 10,
                    y: (Math.random() - 0.5) * 10,
                }
                this.mass = 1;
            }
        
            draw() {
                c1.beginPath();
                c1.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                c1.strokeStyle = this.colour;
                c1.stroke();
            }
        
            update(circleArray) {
                for(let i = 0; i < circleArray.length; i++) {
                    if(this === circleArray[i]) continue;
                    if(getDistance(this.x, this.y, circleArray[i].x, circleArray[i].y) - 2 * this.radius < 0) {
                        resolveCollision(this, circleArray[i])
                    }
                }
        
                if(this.x + this.radius >= canvas1.width || this.x - this.radius <= 0)
                    this.velocity.x = -this.velocity.x;
        
                if(this.y + this.radius >= canvas1.height || this.y - this.radius <= 0)
                    this.velocity.y = -this.velocity.y;
                
                this.x += this.velocity.x;
                this.y += this.velocity.y;
        
                this.draw();
            }
        }
        
        var circleArray = [];
        for(let i = 0; i < 65; i++) {
            var x = Math.random() * (canvas1.width - 40) + 20;
            var y = Math.random() * (canvas1.height - 40) + 20;
            var radius = Math.random() * 20 + 10;

            if(i !== 0) {
                let attempts = 0;
                for(let j = 0; j < circleArray.length && attempts < 1000; j++) {
                    if(getDistance(x, y, circleArray[j].x, circleArray[j].y) - 2 * radius < 0) {
                        x = Math.random() * (canvas1.width - 40) + 20;
                        y = Math.random() * (canvas1.height - 40) + 20;
                        attempts++;
                        j = -1;
                    }
                }
            }

            circleArray.push(new Circle(x, y, radius, `rgb(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255})`));
        }

        var textPulse = 0;
        var pulseDirection = 0.15;

        let msPrev = window.performance.now()
        const fps = 60
        const msPerFrame = 1000 / fps

        function animate1() {
            requestAnimationFrame(animate1);

            // Limit framerate to 60 fps
            const msNow = window.performance.now()
            const msPassed = msNow - msPrev
        
            if (msPassed < msPerFrame) return
        
            const excessTime = msPassed % msPerFrame
            msPrev = msNow - excessTime
            
            c1.clearRect(0, 0, canvas1.width, canvas1.height);
            c1.font = `${30 + textPulse}px Arial`;
            c1.fillStyle = 'black';
            c1.fillText('Work in progress', canvas1.width / 2 - c1.measureText('Work in progress').width / 2, canvas1.height / 2);
        
            textPulse += pulseDirection;
            if (textPulse > 10 || textPulse < 0) {
                pulseDirection *= -1;
            }

            for(let i = 0; i < circleArray.length; i++)
                circleArray[i].update(circleArray);
        }
        
        animate1();
        
        // Second Canvas Animation
        var canvas2 = document.getElementById('canvas2');
        canvas2.width = GAME_WIDTH / 2;
        canvas2.height = GAME_HEIGHT - STRIP_HEIGHT;
        var c2 = canvas2.getContext('2d');

        var mouse2 = {
            x: undefined,
            y: undefined
        }

        window.addEventListener('mousemove', (e) => {
            const rect = canvas2.getBoundingClientRect();
            mouse2.x = (e.clientX - rect.left) * (canvas2.width / rect.width);
            mouse2.y = (e.clientY - rect.top) * (canvas2.height / rect.height);
        });
        
        class Circle2 {
            constructor(x, y, dx, dy, radius, colour) {
                this.x = x;
                this.y = y;
                this.dx = dx;
                this.dy = dy;
                this.radius = radius;
                this.minRadius = radius;
                this.colour = colour;
            }
        
            draw() {
                c2.beginPath();
                c2.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                c2.strokeStyle = this.colour;
                c2.stroke();
                c2.fillStyle = this.colour;
                c2.fill();
            }
        
            update() {
                if(this.x + this.radius > canvas2.width || this.x - this.radius < 0)
                    this.dx = -this.dx
        
                if(this.y + this.radius > canvas2.height || this.y - this.radius < 0)
                    this.dy = -this.dy
        
                this.x += this.dx;
                this.y += this.dy;
        
                if(mouse2.x - this.x < 50 && mouse2.x - this.x > -50 && mouse2.y - this.y < 50 && mouse2.y - this.y > -50 && this.radius < maxRadius)
                    this.radius += 1;
                else if(this.radius > this.minRadius)
                    this.radius -= 1;
        
                this.draw();
            }
        }
        
        var circleArray2 = [];
        for(let i = 0; i < 4800; i++) {
            var x = Math.random() * (canvas2.width - 10) + 5;
            var dx = (Math.random() - 0.5) * 3;
            var y = Math.random() * (canvas2.height - 10) + 5;
            var dy = (Math.random() - 0.5) * 3;
            var radius = Math.random() * 4 + 1;
            circleArray2.push(new Circle2(x, y, dx, dy, radius, `rgb(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255})`));
        }
        
        let msPrev2 = window.performance.now()
        const fps2 = 60
        const msPerFrame2 = 1000 / fps2


        function animate2() {
            requestAnimationFrame(animate2);

            // Limit framerate to 60 fps
            const msNow2 = window.performance.now()
            const msPassed2 = msNow2 - msPrev2
        
            if (msPassed2 < msPerFrame2) return
        
            const excessTime2 = msPassed2 % msPerFrame2
            msPrev2 = msNow2 - excessTime2
            
            c2.clearRect(0, 0, canvas2.width, canvas2.height);
            for(let i = 0; i < circleArray2.length; i++)
                circleArray2[i].update();
        }
        
        animate2();

        var canvas = document.getElementById('stripCanvas');
        canvas.width = GAME_WIDTH;
        canvas.height = STRIP_HEIGHT;
        var c = canvas.getContext('2d');
        c.translate(0, -(GAME_HEIGHT - STRIP_HEIGHT));

        const hero = new Sprite({
            position: {x: GAME_WIDTH / 2 - 300, y: 0},
            platformCollisionBlocks: [],
            imageSrc: '../images/attack1.png',
            scale: 2,
            framesMax: 8,
            velocity: {x: 0, y: 10},
            sprites: {
                idle: {
                    imageSrc: '../images/idle.png',
                    framesMax: 4
                },
                run: {
                    imageSrc: '../images/run.png',
                    framesMax: 8,
                    image: new Image()
                },
                jump: {
                    imageSrc: '../images/jump.png',
                    framesMax: 2,
                    image: new Image()
                },
                fall: {
                    imageSrc: '../images/fall.png',
                    framesMax: 2,
                    image: new Image()
                }
            }

        });

        let portalImage = new Image();
        portalImage.src = '../images/portal.png';

        const homePortal = new Portal({
            framesHold: 9,
            xPosition: 70,
            yPosition: GAME_HEIGHT - 200,
            image: portalImage,
            portalLink: '../index.html',
        });

        let msPrev3 = window.performance.now()

        function animateStrip() {
            requestAnimationFrame(animateStrip);

            const msNow3 = window.performance.now()
            const msPassed3 = msNow3 - msPrev3

            if (msPassed3 < msPerFrame) return

            const excessTime3 = msPassed3 % msPerFrame
            msPrev3 = msNow3 - excessTime3

            c.fillStyle = 'black';
            c.fillRect(0, GAME_HEIGHT - STRIP_HEIGHT, GAME_WIDTH, STRIP_HEIGHT);

            hero.update();
            homePortal.update(hero.hitbox);
        }

        animateStrip();
    </script>
</body>
</html>
