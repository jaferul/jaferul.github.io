<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jafer Nusier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Swash:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div id="stage">
        <canvas id="main"></canvas>
        <button id="showModalButton" onclick='toggleShowControls()' style = 'position: absolute; bottom: 8.3cqh; left: 0.8cqw; cursor: pointer; border-radius: 0.85cqw; height: 5.5cqh; width: 12.5cqw; background-color: white; font-size: 1.56cqw'>Show Controls</button>
        <div id="showControlsModal" style = 'position: absolute; bottom: 40%; left: 35%; width: 30%; display: none; flex-direction: column; gap: 0.95cqw; background-color: white; padding: 1.25cqw; border-radius: 0.85cqw'>
        <button style='width: 2.35cqw; height: 2.35cqw; border-radius: 50%; background-color: inherit; align-self: end; cursor: pointer; font-size: 1cqw' onclick='toggleShowControls()'>X</button>
        <div class='keysRow'>
            <div class='controlKey'>A</div>
            <span>/</span>
            <div class='controlKey'>←</div>
            <span>Move Left</span>
        </div>
            <div class='keysRow'>
            <div class='controlKey'>W</div>
            <span>/</span>
            <div class='controlKey'>↑</div>
            <span>Jump</span>
        </div>
            <div class='keysRow'>
            <div class='controlKey'>D</div>
            <span>/</span>
            <div class='controlKey'>→</div>
            <span>Move Right</span>
        </div>
            <div class='keysRow'>
            <div class='controlKey'>W</div>
            <div class='controlKey'>W</div>
            <span>/</span>
            <div class='controlKey'>↑</div>
            <div class='controlKey'>↑</div>
            <span>Double Jump</span>
        </div>
            <div class='keysRow'>
            <span>Mouse Right Click -</span>
            <span>Attack</span>
        </div>
        </div>
    </div>
    <script src="./utils/functions.js"></script>
    <script src="./utils/sprite.js"></script>
    <script src="./utils/portal.js"></script>
    <script src="index.js"></script>
</body>
</html>
